name: Branch Name Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN="^(feat|fix|refactor|docs|research|data|chore)/[a-z0-9][a-z0-9-]*$"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::브랜치명 '$BRANCH'이 규칙을 위반합니다."
            echo "::error::올바른 형식: feat/my-feature, fix/bug-name, refactor/..., docs/..., research/..., data/..., chore/..."
            echo "::error::소문자 + 숫자 + 하이픈만 허용. 한국어/대문자/언더스코어 금지."
            echo "::error::참고: BRANCH_STRATEGY.md 섹션 2"
            exit 1
          fi
          echo "✅ 브랜치명 OK: $BRANCH"

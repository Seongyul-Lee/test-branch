name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 타입 한 줄 요약 — sequence 형식에서 '#' 이후는 YAML 주석으로 무시된다.
          # (주의: `types: |` literal block scalar 안의 '#' 은 리터럴 문자이므로 절대 사용 금지.)
          # 목록을 수정할 때 scripts/new-branch.sh의 ALLOWED_TYPE_DESCS도 함께 갱신할 것.
          types: |-
            feat
            fix
            refactor
            docs
            research
            data
            chore
            remove
          # 타입별 의미 (참고용 주석 — amannn action은 types만 읽음):
          #   feat      — 신규 기능
          #   fix       — 버그 수정 / hotfix
          #   refactor  — 동작 변경 없는 리팩터
          #   docs      — 문서만 변경
          #   research  — 탐색·실험·리서치
          #   data      — DB 스키마 / 마이그레이션
          #   chore     — 빌드/CI/설정 변경
          #   remove    — 파일·기능 제거
          requireScope: false
          # subject: 대문자 시작만 금지 (한글/소문자/숫자/기호는 모두 허용).
          # → 한국어 subject 완전 호환: "feat: basic enemy AI movement 구현" OK.
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            PR 제목의 subject 부분은 대문자(A-Z)로 시작할 수 없습니다. 한국어는 허용됩니다.
            예: "feat: basic enemy AI movement 구현" (O)
                "feat: 주문 라우터 추가" (O)
                "Feat: Add Order Router" (X)

name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            research
            data
            chore
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            PR 제목의 subject 부분은 소문자로 시작해야 합니다.
            예: "feat: add order router" (O)
                "Feat: Add Order Router" (X)
